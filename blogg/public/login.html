<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Inkwell</title>
  <meta name="description" content="Sign in to your Inkwell account to start writing and commenting.">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <nav class="navbar" id="navbar"></nav>
  </header>

  <main class="form-page">
    <div class="form-card animate-fadeInUp">
      <div class="form-card-header">
        <div class="form-card-icon">🔑</div>
        <h1 class="form-card-title">Welcome back</h1>
        <p class="form-card-subtitle">Sign in to continue your story</p>
      </div>

      <div id="login-alert" class="alert alert-error"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
          <div class="form-error" id="email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <div class="form-error" id="password-error"></div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-gradient w-full mt-2" style="padding:0.85rem;">
          Sign in
        </button>
      </form>

      <div class="form-divider">or</div>
      <p style="text-align:center;font-size:0.9rem;color:var(--text-secondary);">
        Don't have an account?
        <a href="/register.html" style="color:var(--text-link);font-weight:600;">Create one free</a>
      </p>
    </div>
  </main>

  <script src="/app.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/';

    renderNavbar();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('login-alert');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) {
        document.getElementById('email-error').textContent = 'Email is required';
        document.getElementById('email-error').classList.add('show');
        return;
      }
      document.getElementById('email-error').classList.remove('show');

      if (!password) {
        document.getElementById('password-error').textContent = 'Password is required';
        document.getElementById('password-error').classList.add('show');
        return;
      }
      document.getElementById('password-error').classList.remove('show');

      setLoading('login-btn', true, 'Signing in...');

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        Auth.setSession(data.token, data.user);
        window.location.href = '/';
      } catch (err) {
        showAlert('login-alert', err.message, 'error');
        setLoading('login-btn', false, 'Sign in');
      }
    });
  </script>
</body>
</html>
