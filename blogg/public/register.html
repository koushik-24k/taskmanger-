<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Inkwell</title>
  <meta name="description" content="Join Inkwell and start sharing your ideas with the world. Free forever.">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <nav class="navbar" id="navbar"></nav>
  </header>

  <main class="form-page">
    <div class="form-card animate-fadeInUp">
      <div class="form-card-header">
        <div class="form-card-icon">🚀</div>
        <h1 class="form-card-title">Join Inkwell</h1>
        <p class="form-card-subtitle">Create your free account and start writing</p>
      </div>

      <div id="register-alert" class="alert alert-error"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            placeholder="johndoe"
            autocomplete="username"
            required
          >
          <div class="form-error" id="username-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
          <div class="form-error" id="email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="At least 6 characters"
            autocomplete="new-password"
            required
          >
          <div class="form-error" id="password-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm password</label>
          <input
            class="form-input"
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Repeat your password"
            required
          >
          <div class="form-error" id="confirm-password-error"></div>
        </div>

        <button type="submit" id="register-btn" class="btn btn-gradient w-full mt-2" style="padding:0.85rem;">
          Create account
        </button>

        <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;margin-top:0.75rem;">
          By signing up, you agree to our terms. No spam, ever.
        </p>
      </form>

      <div class="form-divider">or</div>
      <p style="text-align:center;font-size:0.9rem;color:var(--text-secondary);">
        Already have an account?
        <a href="/login.html" style="color:var(--text-link);font-weight:600;">Sign in</a>
      </p>
    </div>
  </main>

  <script src="/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/';
    renderNavbar();

    function validateField(id, errorId, condition, message) {
      const el = document.getElementById(id);
      const errEl = document.getElementById(errorId);
      if (condition) {
        errEl.textContent = message;
        errEl.classList.add('show');
        el.style.borderColor = 'var(--accent-rose)';
        return false;
      }
      errEl.classList.remove('show');
      el.style.borderColor = '';
      return true;
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('register-alert');

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      let valid = true;

      valid = validateField('username', 'username-error', !username || username.length < 3, 'Username must be at least 3 characters') && valid;
      valid = validateField('email', 'email-error', !email || !emailRegex.test(email), 'Enter a valid email address') && valid;
      valid = validateField('password', 'password-error', !password || password.length < 6, 'Password must be at least 6 characters') && valid;
      valid = validateField('confirm-password', 'confirm-password-error', password !== confirm, 'Passwords do not match') && valid;

      if (!valid) return;

      setLoading('register-btn', true, 'Creating account...');

      try {
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ username, email, password })
        });
        Auth.setSession(data.token, data.user);
        showAlert('register-alert', '🎉 Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } catch (err) {
        showAlert('register-alert', err.message, 'error');
        setLoading('register-btn', false, 'Create account');
      }
    });
  </script>
</body>
</html>
